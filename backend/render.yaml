services:
  # Production Web Service
  - type: web
    name: factory-management-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server-mock-data.js
    healthCheckPath: /health
    autoDeploy: true
    
    # Environment Variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://factory-management-platform.vercel.app
