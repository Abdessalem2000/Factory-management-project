services:
  # Production Web Service
  - type: web
    name: factory-management-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/test
    autoDeploy: true
    
    # Environment Variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10003
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render dashboard
      - key: FRONTEND_URL
        value: https://factory-management-platform-Abdessalem2000.vercel.app
        
    # Build Configuration
    buildFilter:
      paths:
        - server.js
        - package.json
        - database.js
        - models/
        - src/
